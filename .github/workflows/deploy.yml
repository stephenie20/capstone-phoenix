name: Build → Push → Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'          # adjust to wherever your app source lives
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/ts-a-devops/taskapp-backend
  FRONTEND_IMAGE: ghcr.io/ts-a-devops/taskapp-frontend

jobs:
  # ── 1. Build & push images ──────────────────────────────────────────────────
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag (semver from git tag, else short SHA)
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="sha-$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Tag: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app/backend          # adjust path to your Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./app/frontend         # adjust path to your Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Bump image tags in GitOps repo → Argo auto-deploys ──────────────────
  bump-gitops-tag:
    name: Bump tag in GitOps repo
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write   # needs write to commit back to the repo

    steps:
      - name: Checkout repo (GitOps manifests live here too)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tags in production overlay
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.tag }}
        run: |
          sed -i "s|newTag: \".*\"  # backend|newTag: \"${NEW_TAG}\"  # backend|g" \
            manifests/overlays/production/kustomization.yaml
          sed -i "s|newTag: \".*\"  # frontend|newTag: \"${NEW_TAG}\"  # frontend|g" \
            manifests/overlays/production/kustomization.yaml

          echo "Updated to tag: ${NEW_TAG}"
          grep newTag manifests/overlays/production/kustomization.yaml

      - name: Commit and push tag bump
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/overlays/production/kustomization.yaml
          git commit -m "chore(deploy): bump images to ${NEW_TAG} [skip ci]"
          git push

      # Argo CD polls the repo every 3 min by default and syncs automatically.
      # The [skip ci] tag prevents an infinite loop.
