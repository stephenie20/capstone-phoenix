---
- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install ufw and fail2ban
  apt:
    name:
      - ufw
      - fail2ban
    state: present

- name: Allow SSH through ufw
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through ufw
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through ufw
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable ufw
  ufw:
    state: enabled
    policy: deny

- name: Ensure fail2ban is running
  service:
    name: fail2ban
    state: started
    enabled: true