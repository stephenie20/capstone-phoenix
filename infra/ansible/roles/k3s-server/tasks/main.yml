---
- name: Check if k3s is already installed
  stat:
    path: /usr/local/bin/k3s
  register: k3s_installed

- name: Install k3s server
  shell: |
    curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION="v1.29.4+k3s1" sh -
  when: not k3s_installed.stat.exists

- name: Wait for node-token to exist
  wait_for:
    path: /var/lib/rancher/k3s/server/node-token
    timeout: 60

- name: Read node token
  slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: node_token_raw

- name: Set node token fact
  set_fact:
    k3s_node_token: "{{ node_token_raw.content | b64decode | trim }}"

- name: Share token with workers
  add_host:
    name: "k3s_token_holder"
    k3s_token: "{{ k3s_node_token }}"
    control_plane_private_ip: "{{ ansible_host }}"

- name: Fetch kubeconfig to local machine
  fetch:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ./kubeconfig
    flat: true

- name: Rewrite server address in local kubeconfig
  delegate_to: localhost
  become: false
  replace:
    path: ./kubeconfig
    regexp: 'https://127.0.0.1:6443'
    replace: "https://{{ ansible_host }}:6443"