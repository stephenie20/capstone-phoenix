[defaults]
inventory          = inventory/hosts.ini
roles_path         = roles
collections_paths  = ~/.ansible/collections
host_key_checking  = False
stdout_callback    = default
result_format      = yaml
interpreter_python = auto_silent
forks              = 5

[ssh_connection]
pipelining      = True
ssh_args        = -o ControlMaster=auto -o ControlPersist=60s
