---
apiVersion: batch/v1
kind: Job
metadata:
  name: taskapp-migrate
  namespace: taskapp
  annotations:
    # Argo CD: re-run this job on every sync when the image tag changes
    argocd.argoproj.io/sync-wave: "2"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app: taskapp-migrate
    spec:
      restartPolicy: OnFailure

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        # Wait for Postgres to be accepting connections before migrating
        - name: wait-for-postgres
          image: postgres:16.3
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres-svc -U $POSTGRES_USER -d $POSTGRES_DB; do
                echo "waiting for postgres..."; sleep 3
              done
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_DB

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      containers:
        - name: migrate
          # Image tag set by kustomize overlay — never :latest
          image: ghcr.io/ts-a-devops/taskapp-backend:5d6b8fc
          command: ["alembic", "upgrade", "head"]

          envFrom:
            - configMapRef:
                name: postgres-config
            - configMapRef:
                name: backend-config
            - secretRef:
                name: postgres-secret
            - secretRef:
                name: backend-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
