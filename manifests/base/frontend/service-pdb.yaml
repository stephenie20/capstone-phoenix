---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: taskapp
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: taskapp
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: frontend
