# THIS FILE IS AN EXAMPLE ONLY — never commit the real secret.
# Create the real secret out-of-band:
#
#   kubectl create secret generic postgres-secret \
#     --namespace taskapp \
#     --from-literal=POSTGRES_USER=taskapp \
#     --from-literal=POSTGRES_PASSWORD='<strong-random-password>' \
#     --from-literal=DATABASE_URL='postgresql://taskapp:<password>@postgres:5432/taskapp'
#
# Argo CD is configured to ignore this secret (syncPolicy does not prune it).
# See gitops/application.yaml for the ignoreDifferences block.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: taskapp
type: Opaque
stringData:
  POSTGRES_USER: taskapp
  POSTGRES_PASSWORD: REPLACE_ME
  DATABASE_URL: postgresql://taskapp:REPLACE_ME@postgres:5432/taskapp
