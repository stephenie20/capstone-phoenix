---
# Headless service — gives each pod a stable DNS name (postgres-0.postgres)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: taskapp
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Regular ClusterIP — backend connects via postgres:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: taskapp
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
