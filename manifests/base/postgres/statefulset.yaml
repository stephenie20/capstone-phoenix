---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: taskapp
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: postgres
          image: postgres:16.3  # pinned — no :latest
          ports:
            - containerPort: 5432

          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret

          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

          securityContext:
            readOnlyRootFilesystem: false   # postgres writes to /var/lib/postgresql
            capabilities:
              drop: ["ALL"]
              add:
                - CHOWN
                - FOWNER
                - DAC_OVERRIDE

          startupProbe:
            exec:
              command: ["pg_isready", "-U", "taskapp", "-d", "taskapp"]
            failureThreshold: 30
            periodSeconds: 5

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "taskapp", "-d", "taskapp"]
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3

          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "taskapp", "-d", "taskapp"]
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata   # avoids lost+found ownership issues

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
        # storageClassName omitted — uses cluster default (local-path on k3s)
