---
apiVersion: v1
kind: Namespace
metadata:
  name: taskapp
  labels:
    name: taskapp
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: taskapp-quota
  namespace: taskapp
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
